{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Django Mombasa{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ default_meta_description }}{% endblock %}">
    <link rel="canonical" href="{% block canonical_url %}{{ request.build_absolute_uri }}{% endblock %}">
    <meta property="og:site_name" content="{{ site_name }}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Django Mombasa{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ default_meta_description }}{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ request.build_absolute_uri }}{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ default_og_image }}{% endblock %}">
    <meta property="og:image:alt" content="{% block og_image_alt %}Django Mombasa logo{% endblock %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Django Mombasa{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ default_meta_description }}{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ default_og_image }}{% endblock %}">
    {% block extra_meta %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    {% include "layout/navbar.html" %}
    <main class="flex-grow-1">{% block content %}{% endblock %}</main>
    {% include "layout/footer.html" %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
