{% extends "layout/base.html" %}

{% block title %}Community Apps | Django Mombasa{% endblock %}

{% block extra_css %}
<style>
    .apps-header {
        background-color: var(--dm-primary);
        padding-top: 72px;
    }
    .app-card {
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .app-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
</style>
{% endblock %}

{% block content %}

<!-- Header -->
<section class="apps-header text-white text-center py-5">
    <div class="container py-4">
        <h1 class="fw-bold mb-2">Community Apps</h1>
        <p class="mb-0" style="opacity: 0.8;">Tools and resources built for the community, by the community.</p>
    </div>
</section>

<!-- Apps Grid -->
<section class="py-5">
    <div class="container py-3">
        <div class="row g-4">

        </div>
    </div>
</section>

{% endblock %}
