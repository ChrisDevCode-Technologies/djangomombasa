{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block subject %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#F2F4F3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#1A1A1A;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F2F4F3;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #D6DDD9;">
                    <tr>
                        <td style="background:#0D3F2E;color:#ffffff;padding:20px 24px;font-size:18px;font-weight:600;">
                            {{ site_name }}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;line-height:1.55;font-size:15px;">
                            {% block body %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="background:#F2F4F3;color:#6B7280;padding:16px 24px;font-size:12px;text-align:center;border-top:1px solid #D6DDD9;">
                            You are receiving this message from {{ site_name }}.
                            {% if site_url %}<br><a href="{{ site_url }}" style="color:#1F6B4C;text-decoration:none;">{{ site_url }}</a>{% endif %}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
